<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minicrypt Clique Web Explorer</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel to compile JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased min-h-screen flex flex-col">
    <!-- Root Container for React App -->
    <div id="root" class="flex-grow flex flex-col h-screen"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE = "http://localhost:8000/api";

        function App() {
            const [nodes, setNodes] = useState([]);
            const [edges, setEdges] = useState([]);
            const [source, setSource] = useState("");
            const [target, setTarget] = useState("");
            const [pathData, setPathData] = useState(null);
            const [error, setError] = useState(null);

            // Fetch Graph Schema
            useEffect(() => {
                fetch(`${API_BASE}/graph/schema`)
                    .then(res => res.json())
                    .then(data => {
                        setNodes(data.nodes || []);
                        setEdges(data.edges || []);
                        if (data.nodes && data.nodes.length > 0) {
                            setSource(data.nodes[0]);
                            setTarget(data.nodes[data.nodes.length - 1]);
                        }
                    })
                    .catch(err => {
                        console.error("Failed to load schema:", err);
                        setError("Failed to connect to backend API. Ensure Uvicorn is running on port 8000.");
                    });
            }, []);

            const computePath = async () => {
                try {
                    setPathData(null);
                    setError(null);
                    const response = await fetch(`${API_BASE}/graph/reduce`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ source, target, foundation: "Standard" })
                    });
                    
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail || "API Error");
                    setPathData(data);
                } catch (err) {
                    setError(err.message);
                }
            };

            const handleSwap = () => {
                const temp = source;
                setSource(target);
                setTarget(temp);
                setPathData(null);
                setLiveData(null);
            };

            const [liveData, setLiveData] = useState(null);
            const [payloadInput, setPayloadInput] = useState("");
            
            const executeLive = async () => {
                try {
                    setLiveData({ status: "executing..." });
                    // Provide real outputs depending on Target/Source
                    if (target.includes("OWF")) {
                        const res = await fetch(`${API_BASE}/owf/evaluate`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ x: parseInt(payloadInput) || 12345 })
                        });
                        setLiveData(await res.json());
                    } else if (target.includes("PRG")) {
                        const res = await fetch(`${API_BASE}/prg/next_bits`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ seed_hex: payloadInput || "00112233445566778899aabbccddeeff", n_bits: 64 })
                        });
                        setLiveData(await res.json());
                    } else if (target.includes("CPA")) {
                        const res = await fetch(`${API_BASE}/cpa/encrypt`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ key_hex: "00112233445566778899aabbccddeeff", message_hex: payloadInput || "abcd" })
                        });
                        setLiveData(await res.json());
                    } else if (target.includes("Hash") || target.includes("CRHF") || target.includes("Merkle")) {
                        const res = await fetch(`${API_BASE}/hash/dlp`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message_hex: payloadInput || "48656c6c6f", out_len: 32 })
                        });
                        setLiveData(await res.json());
                    } else {
                        setLiveData({ error: "Live execution Not Implemented Yet for " + target });
                    }
                } catch(e) {
                    setLiveData({ error: e.message });
                }
            };

            return (
                <div className="flex flex-col h-full">
                    {/* Header: Top Bar (Foundation Selector) */}
                    <header className="bg-slate-800 text-white p-4 shadow-md z-10 flex gap-4 items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="text-xl font-bold tracking-wider">Minicrypt Clique Explorer</div>
                            <div className="text-sm bg-slate-700 px-3 py-1 rounded text-slate-300">Phase 4 Active (No-Library Rule)</div>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-sm font-semibold text-slate-300">Foundation Mode:</span>
                            <select className="bg-slate-700 text-white rounded p-1 text-sm border border-slate-600 outline-none">
                                <option>DLP ($g^x \mod p$)</option>
                                <option>AES-128 (PRP)</option>
                            </select>
                        </div>
                    </header>

                    {/* Main Workspace */}
                    <div className="flex flex-grow overflow-hidden">
                        
                        {/* Column 1: Build Panel */}
                        <div className="w-[45%] bg-white p-6 shadow-lg flex flex-col gap-6 overflow-y-auto border-r border-slate-200">
                            <div className="border-b pb-4">
                                <h2 className="text-lg font-semibold text-slate-800 mb-2">Column 1: Build Panel (Source)</h2>
                                <p className="text-sm text-slate-500 mb-4">Select Source Primitive A. Input a raw key to trace its construction step-by-step from the active foundation.</p>
                                
                                <div className="flex flex-col gap-3">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-600 uppercase mb-1">Source Primitive</label>
                                        <select 
                                            value={source} 
                                            onChange={e => setSource(e.target.value)}
                                            className="w-full p-2 border border-slate-300 rounded bg-slate-50"
                                        >
                                            {nodes.map(n => <option key={`src-${n}`} value={n}>{n}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-600 uppercase mb-1">Hex Key / Seed</label>
                                        <input type="text" placeholder="e.g. 0x4F8A..." className="w-full p-2 border border-slate-300 rounded bg-slate-50 font-mono text-sm" />
                                    </div>
                                    <div className="flex gap-2 mt-2">
                                        <button 
                                            onClick={computePath}
                                            className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition-colors"
                                        >
                                            Build Map to Target
                                        </button>
                                        <button 
                                            onClick={handleSwap}
                                            className="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-4 rounded shadow transition-colors"
                                            title="Bidirectional Swap"
                                        >
                                            â‡„ Swap
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Column 2: Reduce Panel */}
                        <div className="w-[55%] bg-slate-50 p-6 overflow-y-auto">
                            <h2 className="text-lg font-semibold text-slate-800 mb-2">Column 2: Reduce Panel (Target) & Live Data Flow</h2>
                            <p className="text-sm text-slate-500 mb-4">Select Target Primitive B. Computes the logical cryptographic sequence leveraging Column 1 strictly as a black box limit.</p>
                            
                            <div className="flex gap-4 pb-4 border-b border-slate-200 mb-4 items-end">
                                    <div className="flex-1">
                                        <label className="block text-xs font-semibold text-slate-600 uppercase mb-1">Target Primitive</label>
                                        <select 
                                            value={target} 
                                            onChange={e => setTarget(e.target.value)}
                                            className="w-full p-2 border border-slate-300 rounded bg-white"
                                        >
                                            {nodes.map(n => <option key={`tgt-${n}`} value={n}>{n}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex-1">
                                        <label className="block text-xs font-semibold text-slate-600 uppercase mb-1">Payload / Query (Hex / Int)</label>
                                        <input type="text" value={payloadInput} onChange={e => setPayloadInput(e.target.value)} placeholder="e.g. 001122..." className="w-full p-2 border border-slate-300 rounded bg-white font-mono text-sm" />
                                    </div>
                                    <button onClick={executeLive} className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition-colors">
                                        Execute Live
                                    </button>
                            </div>
                            
                            {/* Live Output Section */}
                            {liveData && (
                                <div className="mb-6 p-4 bg-gray-900 rounded text-green-400 font-mono text-sm overflow-x-auto shadow-inner">
                                    <div className="text-xs text-gray-400 uppercase mb-2">Live Data Flow (Execution Output):</div>
                                    <pre>{JSON.stringify(liveData, null, 2)}</pre>
                                </div>
                            )}
                            
                            {pathData && pathData.edges && pathData.edges.length > 0 ? (
                                <div className="space-y-4 pt-2">
                                    {pathData.edges.map((edge, i) => (
                                        <div key={i} className="bg-white p-4 border border-slate-300 rounded shadow-sm">
                                            <div className="text-xs uppercase font-bold text-slate-400 mb-1">Black Box Wrap {i + 1}</div>
                                            <div className="flex items-center text-lg font-bold text-slate-800 mb-2">
                                                {edge.from} <span className="text-slate-400 mx-2">→</span> {edge.to}
                                            </div>
                                            <p className="text-slate-600 font-serif text-sm bg-slate-100 p-2 rounded">
                                                {edge.proof}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="flex items-center justify-center h-64 text-slate-400 italic text-center">
                                    Select Source A and Target B to <br/>Calculate Under-the-Hood reduction limits.
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Bottom Panel: Proof Summary */}
                    <div className="bg-slate-900 border-t border-slate-700 text-white p-4">
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="font-bold tracking-wide">Reduction Proof Summary (PA List)</h3>
                            <button className="text-xs bg-slate-700 px-2 py-1 rounded hover:bg-slate-600">Toggle Collapse</button>
                        </div>
                        {pathData ? (
                            <div className="text-sm text-slate-300">
                                <div><span className="text-slate-400">Path Vector:</span> {pathData.path.join(" → ")}</div>
                                <div className="mt-1"><span className={pathData.possible ? "text-green-400" : "text-red-400"}>Status: {pathData.possible ? "Theoretically Identical" : "Irreducible"}</span></div>
                            </div>
                        ) : (
                            <div className="text-sm text-slate-500 italic">No vector loaded.</div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
